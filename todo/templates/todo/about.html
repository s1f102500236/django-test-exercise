<!DOCTYPE html>
<html>
<head>
    <title>このアプリについて</title>
</head>
<body>
    <h1>このアプリについて</h1>

    <p>これは、タスクを管理するためのシンプルなTo Doアプリです。</p>

    <h2>できること</h2>
    <ul>
        <li>新しいタスクを作成できます</li>
        <li>タスクの期限を設定できます</li>
        <li>タスクの詳細を確認できます</li>
        <li>タスクのタイトルや期限を更新できます</li>
        <li>不要になったタスクを削除できます</li>
    </ul>

    <h2>使い方</h2>
    <p>
        トップページのフォームからタスクを追加し、タスク名をクリックすると詳細を確認できます。
        必要に応じて、編集や削除を行うことができます。
    </p>

    <p><a href="/">トップページに戻る</a></p>
</body>
</html>
